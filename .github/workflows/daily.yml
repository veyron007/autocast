name: autocast-daily

# Renders IN the Action — the only place with FFmpeg, minutes, disk, and RAM.
# AutoCast now lives in its OWN public repo, so this workflow ships at the repo
# root. It runs on the daily cron and on manual dispatch. Content is dynamic once
# any ONE free LLM key (GEMINI_API_KEY / GROQ_API_KEY / CEREBRAS_API_KEY) is added
# to repo Secrets; without a key it renders from templates. Upload is skipped
# until the YouTube OAuth secrets are set (see README gate).

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (UTC only; may be delayed under load — fine)
  workflow_dispatch:       # manual trigger (the dashboard "retry / render" button)
    inputs:
      run_id:
        description: "Run id to (re)render, YYYY-MM-DD. Blank = today (UTC)."
        required: false
        default: ""

permissions:
  contents: write          # to commit run.json + manifest back (state + keep-alive)

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # well under the 6h cap
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deps (core + media/tts extras for real render)
        run: uv sync --frozen --extra media --extra tts || uv sync --extra media

      - name: Run pipeline
        # run_id from the manual dispatch input if given, else today (the cron path).
        # The orchestrator is RESUMABLE: dispatching a failed/partial run re-attempts
        # its unfinished stages; a fully-completed run is a no-op (all stages skip).
        run: |
          RUN_ID="${{ github.event.inputs.run_id }}"
          [ -z "$RUN_ID" ] && RUN_ID="$(date -u +%F)"
          echo "rendering run_id=$RUN_ID"
          uv run python -m autocast.orchestrator --run-id "$RUN_ID"
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:     ${{ secrets.CEREBRAS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          FREESOUND_API_KEY:    ${{ secrets.FREESOUND_API_KEY }}
          YT_CLIENT_ID:         ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:     ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:     ${{ secrets.YT_REFRESH_TOKEN }}

      - name: Commit state (always — a failed spine is history too, keeps cron alive)
        if: always()
        run: |
          git config user.name  "autocast-bot"
          git config user.email "bot@autocast.local"
          git add runs/
          git commit -m "run: $(date -u +%F)" || echo "nothing to commit"
          git push
